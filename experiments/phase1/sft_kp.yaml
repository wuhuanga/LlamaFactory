### model
model_name_or_path: /data1/guest/LlamaFactory/models/Llama-3.1-8B

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z2_config.json

### dataset
dataset: medmcqa_sft
template: empty
cutoff_len: 1024
preprocessing_num_workers: 8

### output
output_dir: /data1/guest/LlamaFactory/experiments/phase1/sft_kp_model
logging_steps: 50
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 2.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
optim: adamw_torch
seed: 42
ddp_timeout: 180000000
gradient_checkpointing: false
disable_gradient_checkpointing: true

### OOD Knowledge Preservation (self-distillation)
use_ood_kp_loss: true
ood_kp_alpha: 1.0
ood_kp_data_path: /data1/guest/LlamaFactory/data/dkp_wiki_10k.jsonl
ood_kp_gen_max_new_tokens: 32
ood_kp_every_n_steps: 16
ood_kp_gen_temperature: 1.0
ood_kp_gen_top_p: 0.95

### Teacher model: explicit path + 4-bit quantization to save VRAM
ref_model: /data1/guest/LlamaFactory/models/Llama-3.1-8B
ref_model_quantization_bit: 4
